spring.application.name=memory-jar-backend

# H2 Database for local development
spring.datasource.url=jdbc:h2:mem:memoryjardb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console for easy debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.memoryjar=DEBUG

# Delivery integrations are configured from environment variables for deployment.
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER:}
twilio.sms.number=${TWILIO_SMS_NUMBER:${TWILIO_VOICE_NUMBER:}}
twilio.voice.number=${TWILIO_VOICE_NUMBER:}

memory-jar.email.from=${MEMORY_JAR_EMAIL_FROM:no-reply@memoryjar.local}
